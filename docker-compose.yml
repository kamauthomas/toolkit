version: "3.9"

services:
  app:
    build: .
    ports:
      - "5055:5055"
    env_file:
      - .env
    environment:
      - ENV=production
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=${DATABASE_URL:-sqlite:///instance/toolkit_reports.sqlite3}
      - SMTP_SERVER=${SMTP_SERVER:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM=${SMTP_FROM:-noreply@toolkitafrica.ac.ke}
    volumes:
      - instance_data:/app/instance
      - reports_data:/app/generated_reports
      - logs_data:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5055/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  instance_data:
  reports_data:
  logs_data: