{% extends "base.html" %}
{% block content %}
<section class="auth-card" style="text-align:center;">
  <div class="auth-header" style="justify-content:center;">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--danger);"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    <h1>{{ title }}</h1>
  </div>
  <p class="muted" style="margin-bottom:24px;">{{ message }}</p>
  <a class="primary" href="{{ url_for('dashboard') if g.user else url_for('index') }}" style="display:inline-flex;">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
    Go back
  </a>
</section>
{% endblock %}
