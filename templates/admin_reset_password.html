{% extends "base.html" %}
{% block content %}
<section class="section-head">
  <div>
    <p class="eyebrow">Admin &middot; Reset password</p>
    <h1>{{ target.full_name }}</h1>
    <p class="muted">{{ target.email }} &middot; {{ target.department }} &middot; {{ target.role }}</p>
  </div>
</section>

<section class="card" style="max-width:460px;">
  <h2>Set new password</h2>
  <form method="post" class="form">
    <input type="hidden" name="_csrf_token" value="{{ csrf_token }}">
    <label>New password
      <input type="password" name="password" required minlength="8" placeholder="Min 8 characters">
    </label>
    <label>Confirm password
      <input type="password" name="confirm_password" required minlength="8" placeholder="Repeat new password">
    </label>
    <div style="display:flex;gap:8px;justify-content:flex-end;">
      <a class="secondary small-button" href="{{ back_url }}" style="text-decoration:none;display:inline-flex;padding:8px 16px;">Cancel</a>
      <button class="primary small-button" type="submit">Reset password</button>
    </div>
  </form>
</section>
{% endblock %}
