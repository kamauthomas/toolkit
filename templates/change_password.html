{% extends "base.html" %}
{% block content %}
<section class="auth-card">
  <div class="auth-header">
    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    <h1>Change password</h1>
  </div>
  <form method="post" class="form">
    <input type="hidden" name="_csrf_token" value="{{ csrf_token }}">
    <label>Current password
      <input type="password" name="current_password" required placeholder="Enter current password">
    </label>
    <label>New password
      <input type="password" name="new_password" required minlength="8" placeholder="At least 8 characters">
    </label>
    <label>Confirm new password
      <input type="password" name="confirm_password" required placeholder="Re-enter new password">
    </label>
    <button class="primary" type="submit" style="justify-content:center;">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      Update password
    </button>
  </form>
</section>
{% endblock %}
