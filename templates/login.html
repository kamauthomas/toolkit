{% extends "base.html" %}
{% block content %}
<section class="auth-card">
  <div class="auth-header">
    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
    <h1>Sign in</h1>
  </div>
  <p class="muted" style="margin-bottom:20px;">Use your Toolkit report system account.</p>
  <form method="post" class="form">
    <input type="hidden" name="_csrf_token" value="{{ csrf_token }}">
    <label>Email
      <input type="email" name="email" required autocomplete="email" placeholder="you@example.com">
    </label>
    <label>Password
      <input type="password" name="password" required autocomplete="current-password" placeholder="Enter your password">
    </label>

    <button class="primary" type="submit" style="justify-content:center;">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
      Sign in
    </button>
  </form>
</section>
{% endblock %}
